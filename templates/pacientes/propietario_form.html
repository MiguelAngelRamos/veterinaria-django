{% extends 'base.html' %}

{% block content %} 
<div class="row justify-content-center mt-4">
  <div class="col-md-8 col-lg-6">
    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white">
        <h5 class="mb-0">Registrar Propietario</h5>
      </div>
      <div class="card-body">
       <form method="POST">
          {% csrf_token %}
          <!-- Renderizamos el formulario usando as_p para que cada campo esté en un párrafo separado que preparamos en forms.py -->
          {{ form.as_p }}
          
          <button type="submit" class="btn btn-success">Guardar</button>
          <a href="{% url 'propietario_list' %}" class="btn btn-secondary">Cancelar</a>
       </form>
    </div>
  </div>
</div>
{% endblock %}
