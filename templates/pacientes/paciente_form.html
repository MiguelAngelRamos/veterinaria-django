{% extends 'base.html' %}

{% block content %} 
<div class="row justify-content-center mt-4">
  <div class="col-md-8">
    <div class="card shadow">
      <div class="card-header bg-primary text-white text-center py-3" style="border-radius: 15px 15px 0 0;">
         <h5 class="mb-0"><i class="fa-solid fa-dog me-2"></i>
          {% if form.instance.pk %}
          Editar Mascota
          {% else %}
          Registrar Mascota
          {% endif %}
        </h5>
      </div>
      <div class="card-body">
       <form method="POST">
          {% csrf_token %}
          <!-- Renderizamos el formulario usando as_p para que cada campo esté en un párrafo separado que preparamos en forms.py -->
          {{ form.as_p }}
          
          <div class="d-flex justify-content-end mt-4">
            <button type="submit" class="btn btn-success me-2"><i class="fa-solid fa-check me-2"></i>Guardar</button>
            <a href="{% url 'paciente_list' %}" class="btn btn-secondary">
              <i class="fa-solid fa-xmark me-2"></i>Cancelar</a>
          </div>

       </form>
    </div>
  </div>
</div>
{% endblock %}
