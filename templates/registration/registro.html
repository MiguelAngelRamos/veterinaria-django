{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6">
        <div class="card p-4 shadow">
            <div class="text-center mb-4">
                <i class="fa-solid fa-user-plus fa-4x text-primary" style="color: var(--pastel-primary) !important;"></i>
                <h3 class="mt-3 font-weight-bold">Crear Cuenta</h3>
                <p class="text-muted">Regístrate en nuestro sistema médico veterinario</p>
            </div>
            
            <form method="post">
                {% csrf_token %}
                
                {% if form.errors %}
                <div class="alert alert-danger" role="alert">
                    <i class="fa-solid fa-triangle-exclamation me-2"></i> Por favor corrige los errores abajo indicados.
                </div>
                {% endif %}
                
                <div class="mb-3">
                  <!-- CAMPOS DEL FORMULARIO DE REGISTRO UserCreationForm -->
                    {{ form.as_p }}
                </div>
                
                <div class="d-grid mb-2 mt-4">
                    <button type="submit" class="btn btn-primary btn-lg"><i class="fa-solid fa-check me-2"></i> Registrarme</button>
                    <a href="{% url 'login' %}" class="btn btn-outline-secondary btn-lg mt-2"><i class="fa-solid fa-arrow-left me-2"></i> Volver al Login</a>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
  /* Customize inner django form hints to look better */
form p {
  margin-bottom: 1.2rem;
}

form input,
form select {
  display: block;
  width: 100%;
  border-radius: 10px;
  border: 1px solid #dee2e6;
  padding: 8px 15px;
  margin-top: 5px;
}

form input[type="checkbox"] {
  width: auto;
  display: inline-block;
}

form ul.errorlist {
  color: var(--pastel-danger);
  padding-left: 0;
  list-style: none;
  font-size: 0.9em;
  margin-bottom: 5px;
}

form span.helptext {
  font-size: 0.8em;
  color: #6c757d;
  display: block;
  margin-top: 5px;
  line-height: 1.2;
}
</style>
{% endblock %}
