{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
  <div class="col-md-5">
    <div class="card p-4">
      <div class="text-center mb-4">
        <i class="fa-solid fa-stethoscope fa-3x" style="color: var(--pastel-primary) !important"></i>
        <h3 class="mt-3 fw-bold">Bienvenido(a)</h3>
        <p class="text-muted">Por favor, inicia sesión para continuar</p>
      </div>
      <form method="POST">
        {% csrf_token %}
        <!-- Errores  -->
        {% if form.errors %}
          <div class="alert alert-danger" role="alert">
            <i class="fa-solid fa-triangle-exclamation me-2"></i>Por favor, corrige los errores en el formulario.
          </div>
        {% endif %}
        <div class="mb-3">
          <label for="id_username" class="form-label">Usuario</label>
          <input type="text" name="username" class="form-control" id="id_username" placeholder="Ingrese tu usuario"
            required>
        </div>

        <div class="mb-3">
          <label for="id_password" class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="id_password" name="password"
            placeholder="Ingrese tu contraseña" required>
        </div>

        <div class="mb-2">
          <button type="submit" class="btn btn-primary w-100">Iniciar Sesión</button>
        </div>

        <input type="hidden" name="next" value="{{ next }}">

      </form>
    </div>
  </div>

</div>
{% endblock %}
